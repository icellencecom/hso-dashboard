<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hospital Safety Officer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:"DM Sans",sans-serif;font-size:14px;line-height:1.55;
      background:#0d0f15;color:#e8eaf1;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#0d0f15;}
::-webkit-scrollbar-thumb{background:#252c3d;border-radius:10px;}

:root{
  --bg:#0d0f15;
  --s1:#13161f; --s2:#181c27; --s3:#1e2333; --s4:#252b3e;
  --bd:#1f2537; --bd2:#2b3350;
  --t1:#e8eaf1; --t2:#6e7690; --t3:#383f58;
  --green:#58cc02; --gd:#46a302; --gbg:rgba(88,204,2,.1); --gbd:rgba(88,204,2,.22);
  --blue:#4d9fff; --bbg:rgba(77,159,255,.1); --bbd:rgba(77,159,255,.22);
  --yellow:#ffc800; --ybg:rgba(255,200,0,.1); --ybd:rgba(255,200,0,.22);
  --red:#ff4b4b; --rbg:rgba(255,75,75,.1); --rbd:rgba(255,75,75,.22);
  --orange:#ff9600; --obg:rgba(255,150,0,.1);
  --purple:#ce82ff; --pbg:rgba(206,130,255,.1);
  --r:14px; --rl:20px; --pill:999px;
}

/* FIXED NAV FOR MOBILE */
.nav{position:sticky;top:0;z-index:100;height:56px;background:var(--s1);
     border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:6px;}
.nav-logo{height:28px;width:auto;object-fit:contain;flex-shrink:0;}
.nav-sep{width:1px;height:16px;background:var(--bd2);flex-shrink:0;margin:0 4px;}

/* Allows the links to slide on small screens */
.nav-links{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
.nav-links::-webkit-scrollbar {display:none;}

.nb{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--pill);
    border:none;background:none;color:var(--t2);font-size:12px;font-weight:600;
    font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .13s;flex-shrink:0;}
.nb svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.nb:hover{background:var(--s3);color:var(--t1);}
.nb.on{background:var(--gbg);color:var(--green);border:1px solid var(--gbd);}

.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}
.live{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--pill);
      background:var(--gbg);border:1px solid var(--gbd);font-size:10px;font-weight:800;
      color:var(--green);text-transform:uppercase;letter-spacing:.06em;}

/* SHELL */
.shell{max-width:1120px;margin:0 auto;padding:32px 24px 64px;}
@media(max-width:600px){
    .shell{padding:16px 14px 48px;}
    .nav-right .nav-clock, .nav-right .nav-user { display:none; } /* Hide extra info on tiny screens */
}

/* VIEWS */
.view{display:none;}
.view.active{display:block;animation:up .2s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD GRID */
.mc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
@media(max-width:900px){.mc-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:560px){.mc-grid{grid-template-columns:repeat(2,1fr);}}

.mc{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;padding:22px 10px 18px;background:var(--s2);border:1.5px solid var(--bd);
  border-radius:18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.mc:hover{transform:translateY(-5px);border-color:var(--cc,#58cc02);background:var(--s3);}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px;}
@media(max-width:540px){.stat-grid{grid-template-columns:1fr;}}
.sc{background:var(--s2);border:1px solid var(--bd);border-radius:18px;padding:20px 22px;display:flex;align-items:center;gap:18px;}

/* OTHER STYLES */
.dash-title{font-family:"Nunito",sans-serif;font-size:28px;font-weight:900;color:var(--t1);letter-spacing:-.03em;}
.sec-label{font-family:"Nunito",sans-serif;font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;margin:0 0 12px;}
.nav-clock{font-family:"DM Mono",monospace;font-size:12px;color:var(--t2);background:var(--s2);border:1px solid var(--bd);border-radius:var(--pill);padding:3px 10px;}
</style>
</head>
<body>

<nav class="nav">
  <img id="nav-logo" class="nav-logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 90 36'%3E%3Crect width='90' height='36' rx='6' fill='%2358cc02'/%3E%3Ctext x='45' y='25' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='16' fill='white'%3EHSO%3C/text%3E%3C/svg%3E" alt="HSO"/>
  <div class="nav-sep"></div>
  <div class="nav-links" id="main-nav">
    <button class="nb" id="btn-dashboard" onclick="showView('dashboard')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</button>
    <button class="nb" id="btn-training" onclick="showView('training')"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>Training</button>
    <button class="nb" id="btn-lifesafety" onclick="showView('lifesafety')"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Life Safety</button>
    <button class="nb" id="btn-rounds" onclick="showView('rounds')"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Rounds</button>
  </div>
  <div class="nav-right">
    <div class="live">Live</div>
    <div class="nav-clock" id="clock">00:00</div>
  </div>
</nav>

<div class="shell">

  <div id="view-dashboard" class="view">
    <div class="dash-head" style="margin-bottom: 24px;">
      <div class="dash-title">Good morning 👋</div>
      <div id="dateDisplay" style="color:var(--t2); font-size: 13px;"></div>
    </div>

    <div class="sec-label">Modules</div>
    <div class="mc-grid">
      <div class="mc" onclick="showView('lifesafety')" style="--cc:#ff4b4b;">
        <div class="mc-emoji">🛡️</div>
        <div class="mc-label">Life Safety</div>
      </div>
      <div class="mc" onclick="showView('training')" style="--cc:#58cc02;">
        <div class="mc-emoji">🎓</div>
        <div class="mc-label">Training</div>
      </div>
      <div class="mc" onclick="showView('rounds')" style="--cc:#58cc02;">
        <div class="mc-emoji">✅</div>
        <div class="mc-label">Rounds</div>
      </div>
      <div class="mc" onclick="showView('security')" style="--cc:#4d9fff;">
        <div class="mc-emoji">🔒</div>
        <div class="mc-label">Security</div>
      </div>
    </div>

    <div class="sec-label">Status Overview</div>
    <div class="stat-grid">
      <div class="sc">
        <div class="sc-num" style="color:var(--red); font-size: 32px; font-weight: 900;">4</div>
        <div class="sc-lbl" style="margin-left: 10px; color: var(--t2);">Overdue Items</div>
      </div>
      <div class="sc">
        <div class="sc-num" style="color:var(--green); font-size: 32px; font-weight: 900;">12</div>
        <div class="sc-lbl" style="margin-left: 10px; color: var(--t2);">Completed</div>
      </div>
    </div>
  </div>

  <div id="view-training" class="view">
      <button class="nb" onclick="showView('dashboard')" style="margin-bottom:20px;">← Back to Dashboard</button>
      <h2>Training Module</h2>
  </div>
  
  <div id="view-lifesafety" class="view">
      <button class="nb" onclick="showView('dashboard')" style="margin-bottom:20px;">← Back to Dashboard</button>
      <h2>Life Safety Module</h2>
  </div>

  <div id="view-rounds" class="view">
      <button class="nb" onclick="showView('dashboard')" style="margin-bottom:20px;">← Back to Dashboard</button>
      <h2>Safety Rounds</h2>
  </div>

</div>

<script>
// THE VIEW SWITCHER
function showView(viewId) {
    // Hide all views
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    
    // Show target view
    const target = document.getElementById('view-' + viewId);
    if(target) target.classList.add('active');

    // Update Nav Buttons
    document.querySelectorAll('.nb').forEach(btn => btn.classList.remove('on'));
    const activeBtn = document.getElementById('btn-' + viewId);
    if(activeBtn) activeBtn.classList.add('on');

    // Scroll back to top
    window.scrollTo(0,0);
}

// AUTO-LAUNCH LOGIC
document.addEventListener('DOMContentLoaded', () => {
    // Set default view
    showView('dashboard');

    // Clock Logic
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);

    // Date Logic
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString(undefined, options);
});
</script>

</body>
</html>
